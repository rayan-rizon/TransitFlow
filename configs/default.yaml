# TransitFlow default configuration (single TESS-sector regime, Variant A / FMPE).
# This preserves the historical 5D ephemeris-conditioned setup with shape-realism
# knobs off. Use configs/publishable.yaml for the canonical full-gate run.

simulator:
  n_global: 2001
  n_local: 201
  n_durations: 4.0
  baseline_days: 27.0
  n_raw: 18000
  planet_fraction: 0.5
  hard_negative_fraction: 0.5
  frac_real: 0.70          # used only if a NoiseLibrary has been built
  frac_gp: 0.20
  frac_white: 0.10
  sigma_white_log10_low: -3.7
  sigma_white_log10_high: -2.3
  gp_amp_log10_low: -3.5
  gp_amp_log10_high: -2.0
  gp_tau_frac_low: 0.02
  gp_tau_frac_high: 0.30
  gp_kernel: matern32
  eb_depth_low: 0.01
  eb_depth_high: 0.10
  engine: native
  n_radial: 200
  regime: tess
  exposure_minutes: 0.0     # 0/1 subsample preserves legacy instantaneous model
  n_exposure_subsamples: 1
  dilution_fraction: 0.0
  dilution_low: 0.5
  dilution_high: 1.0
  gap_fraction: 0.0
  gap_duration_range: [0.10, 0.80]
  a_rs_prior_mode: log_uniform  # log_uniform | stellar_density
  stellar_density_log10_mean: 0.0
  stellar_density_log10_std: 0.25
  flatten_views: false
  use_periodogram: true     # box-periodogram channel -> calibrated period posterior
  n_period_bins: 256
  pg_n_phase: 64
  pg_n_raw: 4096            # subsample raw LC for periodogram only (4× faster gen)

model:
  param_dim: 5
  embed_dim: 256
  head: fmpe               # fmpe | npe  (npe = Variant B ablation)
  use_noise_feature: true
  use_periodogram: true     # consume the periodogram channel (period-fix)
  use_ephemeris_feature: true # condition on candidate P/t0 used for folding
  global_channels: [32, 64, 128, 128, 256, 256]
  local_channels: [32, 64, 128, 128]
  pg_channels: [32, 64, 128, 128]
  global_dim: 256
  local_dim: 128
  pg_dim: 128
  blocks_per_stage: 2
  det_hidden: 128
  det_dropout: 0.1
  fm_hidden: 256
  fm_blocks: 4
  fm_time_dim: 64
  npe_hidden: 128
  npe_transforms: 6
  npe_backend: auto

train:
  n_steps: 60000
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 1.0e-5
  lambda_det: 1.0
  grad_clip: 5.0
  warmup_steps: 500
  eval_every: 2000
  eval_batches: 8
  log_every: 100
  device: auto
  seed: 0
  amp: true                 # bf16 autocast on CUDA
  run_dir: runs/fmpe        # checkpoints/, training_log.jsonl, status.json land here
  ckpt_every: 2000          # periodic latest.pt + rotating step_*.pt
  keep_last: 3
  resume: null              # set to the run_dir (or a .pt) to resume
  tensorboard: true
  tf32: true                # TF32 matmul/conv on Ampere+ (free speedup on a 4090)
  expect_device: cuda       # preflight warns/aborts if the run isn't on CUDA
  nan_patience: 20          # abort after this many non-finite losses (anti-waste)
  # --- data source ---
  # RECOMMENDED on a rented GPU: pre-generate once and train from disk so the GPU
  # stays saturated (the CPU simulator can't feed a 4090 on the fly). See
  # scripts/generate_data.py.  Leave data_dir null to simulate on the fly.
  data_source: simulate     # "simulate" | "disk"
  data_dir: null            # e.g. data/tess_1M  (sets data_source to disk via --data-dir)
  num_workers: 4            # on-the-fly prefetch processes (raise to ~CPU_cores-2)
  prefetch: 8
  noise_lib_path: null      # path to a real-noise .npz to enable the real regime

inference:
  ode_steps: 50
  ode_method: rk4
  n_posterior: 2000
